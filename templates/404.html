{% extends 'base.html' %}

{% block content %}
<div class="container text-center py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 py-5 card shadow border-secondary bg-dark text-white">
            <h1 class="display-1 fw-bold text-danger">404</h1>
            <h2 class="mb-3">Page Not Found</h2>
            <p class="text-secondary mb-4">The page you are looking for does not exist or has been moved.</p>
            <a href="{{ url_for('dashboard') }}" class="btn btn-info text-dark fw-semibold px-4">
                <i class="fa-solid fa-house me-2"></i>Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
